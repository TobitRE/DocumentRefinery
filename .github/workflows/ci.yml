name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: config.settings
  CELERY_BROKER_URL: "memory://"
  CELERY_RESULT_BACKEND: "cache+memory://"

jobs:
  django-tests:
    name: Django tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATA_ROOT: ${{ runner.temp }}/document-refinery-data
      HF_HOME: ${{ runner.temp }}/document-refinery-data/hf_cache
      DOCLING_CACHE_DIR: ${{ runner.temp }}/document-refinery-data/docling_cache
      DOCLING_ARTIFACTS_PATH: ${{ runner.temp }}/document-refinery-data/docling_artifacts

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare runtime directories
        run: |
          mkdir -p "$DATA_ROOT" "$HF_HOME" "$DOCLING_CACHE_DIR" "$DOCLING_ARTIFACTS_PATH"

      - name: Run Django tests
        run: python document_refinery/manage.py test

  ruff-lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Run Ruff
        run: ruff check .

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATA_ROOT: ${{ runner.temp }}/document-refinery-data
      HF_HOME: ${{ runner.temp }}/document-refinery-data/hf_cache
      DOCLING_CACHE_DIR: ${{ runner.temp }}/document-refinery-data/docling_cache
      DOCLING_ARTIFACTS_PATH: ${{ runner.temp }}/document-refinery-data/docling_artifacts

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install coverage

      - name: Prepare runtime directories
        run: |
          mkdir -p "$DATA_ROOT" "$HF_HOME" "$DOCLING_CACHE_DIR" "$DOCLING_ARTIFACTS_PATH"

      - name: Run coverage
        run: python -m coverage run document_refinery/manage.py test

      - name: Report coverage
        run: python -m coverage report -m --fail-under=90
